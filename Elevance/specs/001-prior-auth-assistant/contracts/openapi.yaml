openapi: 3.0.3
info:
  title: Prior Authorization Evidence Assistant API
  version: 1.0.0
  description: API Gateway orchestrating the 5-agent pipeline for PA cases.
paths:
  /cases:
    post:
      summary: Create a new PA case
      operationId: createCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [member_id, provider_id, request_type]
              properties:
                member_id:
                  type: string
                provider_id:
                  type: string
                request_type:
                  type: string
                cpt_hcpcs_codes:
                  type: array
                  items:
                    type: string
                icd_10_codes:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Case created
          content:
            application/json:
              schema:
                type: object
                properties:
                  case_id:
                    type: string
                  status:
                    type: string
                  next_step:
                    type: string

  /cases/{case_id}/documents:
    post:
      summary: Upload attachments (PDFs, images) for a case
      operationId: uploadDocuments
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Documents accepted for async OCR and indexing

  /cases/{case_id}/completeness:
    get:
      summary: Check if the case is complete
      operationId: getCompleteness
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Completeness report
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_complete:
                    type: boolean
                  missing_fields:
                    type: array
                    items:
                      type: string

  /cases/{case_id}/evidence:
    get:
      summary: Retrieve evidence matched against policy criteria
      operationId: getEvidence
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence chunks with citations
          content:
            application/json:
              schema:
                type: object
                properties:
                  evidence_items:
                    type: array
                    items:
                      type: object
                      properties:
                        criterion:
                          type: string
                        status:
                          type: string
                          enum: [present, absent, unclear]
                        matched_text:
                          type: string
                        source_name:
                          type: string
                        confidence:
                          type: number

  /cases/{case_id}/gap-analysis:
    get:
      summary: Get the criteria checklist
      operationId: getGapAnalysis
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Gap checklist
          content:
            application/json:
              schema:
                type: object
                properties:
                  checklist:
                    type: array
                    items:
                      type: object
                      properties:
                        criterion:
                          type: string
                        status:
                          type: string
                          enum: [present, absent, unclear]
                        rationale:
                          type: string
                        evidence_refs:
                          type: array
                          items:
                            type: string

  /cases/{case_id}/summary:
    get:
      summary: Generate human-readable case summary and drafts
      operationId: getSummary
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Generated summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  case_summary:
                    type: object
                    properties:
                      summary_text:
                        type: string
                      evidence_refs:
                        type: array
                        items:
                          type: string
                  provider_draft:
                    type: string
                  escalation_note:
                    type: string

  /cases/{case_id}/routing:
    get:
      summary: Get routing queue assignment
      operationId: getRouting
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Routing assignment
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: string
                  reason:
                    type: string
                  confidence:
                    type: number

  /cases/{case_id}/audit:
    get:
      summary: Get full audit trail
      operationId: getAuditLog
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit logs for the case
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    agent:
                      type: string
                    action:
                      type: string
                    input_hash:
                      type: string
                    prompt_version:
                      type: string
                    sources:
                      type: array
                      items:
                        type: string
                    timestamp:
                      type: string
                    model_version:
                      type: string
                    confidence_score:
                      type: number
