# infrastructure/minio/minio-compose.yml
# MinIO S3-compatible object storage for isolated case documents.
# Constitution §II: no external egress — all document storage is local.
#
# Usage:
#   docker-compose -f infrastructure/minio/minio-compose.yml up -d

services:
  minio:
    image: minio/minio:latest
    container_name: pa_minio
    command: server /data --console-address ":9001"
    environment:
      # Credentials are for local dev only; inject via Vault in production.
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # One-shot init container: creates the pa-case-documents bucket on first run.
  minio_init:
    image: minio/mc:latest
    container_name: pa_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/pa-case-documents &&
        mc anonymous set none local/pa-case-documents &&
        echo 'Bucket pa-case-documents ready.'
      "
    restart: "no"

volumes:
  minio_data:
