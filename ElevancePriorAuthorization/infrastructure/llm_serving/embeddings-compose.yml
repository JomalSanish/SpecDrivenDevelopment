# infrastructure/llm_serving/embeddings-compose.yml
# Local Text Embeddings Inference (TEI) endpoint for BAAI/bge-large-en-v1.5.
# Constitution §II: ZERO external API egress — embeddings run locally only.
#
# Requirements:
#   - NVIDIA GPU with CUDA support (for GPU variant)
#   - At least 4 GB VRAM for bge-large-en-v1.5
#
# CPU-only fallback:
#   Change image tag from cuda-latest to cpu-latest and remove the
#   'deploy' block below.
#
# Usage:
#   docker-compose -f infrastructure/llm_serving/embeddings-compose.yml up -d

services:
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: pa_tei
    # GPU variant (comment out image above and uncomment below for CUDA):
    # image: ghcr.io/huggingface/text-embeddings-inference:cuda-latest
    command: --model-id BAAI/bge-large-en-v1.5 --port 80
    ports:
      - "8080:80"
    volumes:
      - tei_model_cache:/data
    # Uncomment for GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  tei_model_cache:
