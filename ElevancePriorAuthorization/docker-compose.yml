# docker-compose.yml — master compose for local development
# Starts all Phase 1 infrastructure services.
#
# Constitution §II: ALL services are locally hosted — no external egress.
#
# Usage:
#   docker-compose up -d
#
# Selective start (as per quickstart.md):
#   docker-compose up -d postgres minio qdrant ollama tei

services:

  # ------------------------------------------------------------------
  # PostgreSQL — workflow & case state
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pa_postgres
    environment:
      POSTGRES_USER: pa_user
      POSTGRES_PASSWORD: pa_password
      POSTGRES_DB: pa_evidence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pa_user -d pa_evidence"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ------------------------------------------------------------------
  # MinIO — local S3-compatible object storage for case documents
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: pa_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  minio_init:
    image: minio/mc:latest
    container_name: pa_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/pa-case-documents &&
        mc anonymous set none local/pa-case-documents &&
        echo 'Bucket pa-case-documents ready.'
      "
    restart: "no"

  # ------------------------------------------------------------------
  # Qdrant — local vector store
  # ------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: pa_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./infrastructure/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Ollama — local open-weight LLM (no external API calls)
  # ------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: pa_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ------------------------------------------------------------------
  # TEI — local embeddings (BAAI/bge-large-en-v1.5), CPU variant
  # For GPU: change image to cuda-latest and uncomment 'deploy' block.
  # ------------------------------------------------------------------
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: pa_tei
    command: --model-id BAAI/bge-large-en-v1.5 --port 80
    ports:
      - "8080:80"
    volumes:
      - tei_model_cache:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  ollama_data:
  tei_model_cache: